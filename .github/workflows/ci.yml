name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate sitemap
        run: npm run generate-sitemap

      - name: Build (and prerender)
        run: npm run build

      - name: Upload `dist` artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  lighthouse:
    name: Lighthouse Audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Start static server
        run: npx http-server dist -p 8080 -c-1 &

      - name: Wait for server
        run: |
          for i in {1..20}; do
            curl --silent --fail http://localhost:8080 && break || sleep 1
          done

      - name: Run Lighthouse (HTML + JSON)
        run: |
          mkdir -p lighthouse
          npx -y lighthouse http://localhost:8080 \
            --output json --output-path ./lighthouse/report.json \
            --output html --output-path ./lighthouse/report.html \
            --chrome-flags="--no-sandbox --headless" --quiet

      - name: Check Lighthouse thresholds
        run: node scripts/check-lighthouse.js

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            lighthouse/report.html
            lighthouse/report.json
